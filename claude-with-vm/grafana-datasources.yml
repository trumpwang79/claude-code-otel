apiVersion: 1

datasources:
  # 查询走 vmselect（集群版查询入口），兼容 Prometheus 查询接口
  - name: VictoriaMetrics
    type: prometheus
    access: proxy
    url: http://172.18.0.1:8481/select/0/prometheus
    isDefault: true
    uid: victoriametrics

  - name: loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
