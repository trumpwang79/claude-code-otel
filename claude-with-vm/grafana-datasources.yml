apiVersion: 1

datasources:
  # VictoriaMetrics 兼容 Prometheus 查询接口，数据源类型选 prometheus
  - name: VictoriaMetrics
    type: prometheus
    access: proxy
    url: http://victoriametrics:8428
    isDefault: true
    uid: victoriametrics

  - name: loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
