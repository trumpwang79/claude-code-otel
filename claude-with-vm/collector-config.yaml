# ── 接收器 ──────────────────────────────────────────────
# Claude Code 通过 OTLP 协议推送指标和日志到这里
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
 
 
# ── 导出器 ──────────────────────────────────────────────
exporters:
  # 指标通过 Prometheus Remote Write 推送到 vminsert
  # 客户端需设置 OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=cumulative
  prometheusremotewrite:
    endpoint: http://172.18.0.1:8480/insert/0/prometheus/
 
  # 日志推送给 Loki
  otlphttp:
    endpoint: http://loki:3100/otlp
 
# ── 管道 ────────────────────────────────────────────────
service:
  pipelines:
    metrics:
      receivers: [otlp]
      exporters: [prometheusremotewrite]    # 指标 → VictoriaMetrics
 
    logs:
      receivers: [otlp]
      exporters: [otlphttp]                 # 日志 → Loki