# ── 接收器 ──────────────────────────────────────────────
# Claude Code 通过 OTLP 协议推送指标和日志到这里
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317


# ── 导出器 ──────────────────────────────────────────────
exporters:
  # 指标通过 Prometheus Remote Write 推送到 vminsert
  # 客户端需设置 OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=cumulative
  otlphttp/vm:
    endpoint: http://172.18.0.1:8480/insert/0/opentelemetry/

  debug:
    verbosity: normal

  # 日志推送给 Loki
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

# ── 管道 ────────────────────────────────────────────────
service:
  pipelines:
    metrics:
      receivers: [otlp]
      exporters: [otlphttp/vm, debug]    # 指标 → VictoriaMetrics + 控制台

    logs:
      receivers: [otlp]
      exporters: [debug, otlphttp/loki]                 # 日志 → Loki + 控制台
