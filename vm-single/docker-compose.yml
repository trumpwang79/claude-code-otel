services:
  vmstorage:
    container_name: vmstorage
    image: victoriametrics/vmstorage:latest
    network_mode: host
    ports:
      - 8482:8482
      - 8400:8400
      - 8401:8401
    volumes:
      - vmstorage-data:/storage
    command:
      - '--storageDataPath=/storage'
      - '--retentionPeriod=15d'
    restart: always

  vminsert:
    container_name: vminsert
    image: victoriametrics/vminsert:latest
    depends_on:
      - "vmstorage"
    network_mode: host
    command:
      - '--storageNode=127.0.0.1:8400'
    ports:
      - 8480:8480
    restart: always

  vmselect:
    container_name: vmselect
    image: victoriametrics/vmselect:latest
    depends_on:
      - "vmstorage"
    network_mode: host
    command:
      - '--storageNode=127.0.0.1:8401'
    ports:
      - 8481:8481
    restart: always

volumes:
  vmstorage-data:
